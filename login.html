<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk - FIVE STAR 2</title>
    
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-1.png">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // 1. TEMA INSTAN (Mencegah Layar Putih/Blink)
        (function() {
            const savedTheme = localStorage.getItem('app-theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme === 'dark' || (!savedTheme && systemDark);
            
            document.documentElement.classList.toggle('dark-theme', isDark);
            
            const applyToBody = () => {
                if (document.body) document.body.classList.toggle('dark-theme', isDark);
            };
            applyToBody();
            window.addEventListener('DOMContentLoaded', applyToBody);
        })();
    </script>

    <style>
        body { margin: 0; padding: 0; background: var(--bg-color); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .login-page-container { width: 100%; max-width: 100%; height: 100%; background: var(--card-bg); display: flex; flex-direction: column; justify-content: center; padding: 40px 25px; box-sizing: border-box; }
        .input-box { background: rgba(142,142,147,0.08); border: 2px solid transparent; padding: 16px; border-radius: 12px; width: 100%; box-sizing: border-box; outline: none; color: var(--text-primary); font-size: 15px; transition: 0.3s; font-weight: 500; margin-bottom: 15px; }
        .input-box:focus { border-color: #007AFF; background: var(--bg-color); }
        .btn-masuk { width: 100%; padding: 16px; border-radius: 14px; background: #007AFF; color: white; border: none; margin-top: 35px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); transition: 0.2s; }
        .btn-masuk:active { transform: scale(0.98); opacity: 0.9; }
        .ios-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 25000; align-items: center; justify-content: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div class="login-page-container">
        <div style="text-align: center; margin-bottom: 40px;">
            <img id="loginLogo" src="assets/fs2-black.png" alt="Logo" style="width: 200px; margin-bottom: 10px;">
            <p style="font-size: 14px; color: #8E8E93; margin: 0; font-weight: 500;">Silakan masuk untuk melanjutkan</p>
        </div>
        
        <div class="input-group">
            <input type="text" id="loginUser" placeholder="Email / Username" class="input-box" oninput="this.value = this.value.toLowerCase()">
        </div>
        
        <div class="input-group" style="position: relative;">
            <input type="password" id="loginPass" placeholder="Kata Sandi" class="input-box" style="padding-right: 40px; margin-bottom: 0;">
            <span onclick="togglePassword()" style="position: absolute; right: 15px; top: 16px; color: #8E8E93; cursor: pointer; padding: 5px;">
                <i id="eyeIcon" class="fa-solid fa-eye"></i>
            </span>
        </div>
        
        <div style="text-align: right; margin-top: 15px;">
            <a href="javascript:void(0)" onclick="bukaPopupLupaPassword()" style="color: #007AFF; font-size: 13px; text-decoration: none; font-weight: 700;">Lupa Kata Sandi?</a>
        </div>
        
        <button onclick="prosesLogin()" id="btnLogin" class="btn-masuk">Masuk</button>
        
        <div style="margin-top: 40px; text-align: center;">
            <p style="font-size: 12px; color: #8E8E93; position: relative; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">
                <span style="background: var(--card-bg); padding: 0 10px; position: relative; z-index: 2;">Atau masuk dengan</span>
            </p>
            <div style="border-bottom: 1px solid rgba(142,142,147,0.2); margin-top: -10px;"></div>
            
            <div style="display: flex; justify-content: center; margin-top: 25px;">
                <button onclick="loginPihakKetiga('google')" style="width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(142,142,147,0.2); background: var(--bg-color); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style="width: 25px;">
                </button>
            </div>
        </div>
        
        <div style="margin-top: auto; padding-top: 40px; text-align: center; font-size: 14px; margin-bottom: env(safe-area-inset-bottom);">
            <span style="color: #8E8E93; font-weight: 500;">Belum punya akun?</span> 
            <a href="javascript:void(0);" onclick="inisialisasiRegister()" style="color: #007AFF; text-decoration: none; font-weight: 700;"> Daftar Sekarang</a>
        </div>
    </div>

    <div id="lupaPassOverlay" class="ios-overlay">
        <div class="profile-expand-anim" style="width: 320px; padding: 25px 20px; border-radius: 20px; background: var(--card-bg); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <div style="width: 55px; height: 55px; background: rgba(0,122,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <i class="fa-solid fa-envelope" style="font-size: 24px; color: #007AFF;"></i>
            </div>
            <h3 style="margin: 0 0 10px 0; color: var(--text-primary); font-size: 18px; font-weight: 800;">Reset Kata Sandi</h3>
            <p style="font-size: 13px; color: #8E8E93; margin-bottom: 20px;">Masukkan email terdaftar Anda.</p>
            <input type="email" id="emailResetLupa" placeholder="email@contoh.com" class="input-box" style="text-align: center; margin-bottom: 20px;">
            <div style="display: flex; gap: 10px;">
                <button onclick="tutupPopupLupaPassword()" style="flex: 1; padding: 14px; border-radius: 12px; background: rgba(142,142,147,0.1); color: #FF3B30; border: none; font-weight: 700; cursor: pointer;">Batal</button>
                <button onclick="prosesResetSandi()" style="flex: 1; padding: 14px; border-radius: 12px; background: #007AFF; color: white; border: none; font-weight: 700; cursor: pointer;">Kirim</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="js/core/firebase.js"></script>
    <script src="js/core/main.js"></script>
    <script src="js/auth/register.js"></script>

    <script>
        // --- INITIALIZE UI ---
        window.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark-theme');
            document.getElementById('loginLogo').src = isDark ? 'assets/fs2-white.png' : 'assets/fs2-black.png';
        });

        function togglePassword() {
            const input = document.getElementById('loginPass');
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

 // Navigasi Back di Login.html (Versi Bersih)
function bukaPopupLupaPassword() {
    document.getElementById('lupaPassOverlay').style.display = 'flex';
    history.pushState({ id: 'lupaPassModal' }, '', ''); // Hanya tambah history saat popup buka
}

function tutupPopupLupaPassword() {
    const overlay = document.getElementById('lupaPassOverlay');
    if (overlay.style.display === 'flex') {
        overlay.style.display = 'none';
        if (history.state && history.state.id === 'lupaPassModal') history.back();
    }
}

// Listener back HP HANYA untuk menutup popup
window.addEventListener('popstate', (e) => {
    const overlay = document.getElementById('lupaPassOverlay');
    if (overlay && overlay.style.display === 'flex') {
        if (!e.state || e.state.id !== 'lupaPassModal') {
            overlay.style.display = 'none';
        }
    }
});


        // --- CORE FIREBASE LOGIC ---
        async function sinkronisasiDataUser(uid) {
            try {
                const snapshot = await window.db.ref(uid).once('value');
                if (snapshot.exists()) {
                    const d = snapshot.val();
                    localStorage.setItem('nama_user', d.nama || "User");
                    localStorage.setItem('username', d.username || "user");
                    localStorage.setItem('user_foto_base64', d.foto || "");
                    return true;
                }
            } catch (e) { console.error(e); }
            return false;
        }

        async function prosesLogin() {
            const userIn = document.getElementById('loginUser').value.trim().toLowerCase();
            const passIn = document.getElementById('loginPass').value;
            
            if (!userIn || !passIn) return IOSAlert.show("Peringatan", "Harap isi semua bidang!");

            const btn = document.getElementById('btnLogin');
            const originalText = btn.innerText;
            btn.innerText = "Memeriksa...";
            btn.disabled = true;

            let email = userIn;
            try {
                if (!userIn.includes('@')) {
                    const snap = await window.db.ref().orderByChild('username').equalTo(userIn).once('value');
                    if (!snap.exists()) throw new Error("Username tidak terdaftar.");
                    snap.forEach(c => email = c.val().email);
                }

                const res = await firebase.auth().signInWithEmailAndPassword(email, passIn);
                const uid = res.user.uid;

                // SMART CACHE CLEARING
                if (localStorage.getItem('last_uid') !== uid) {
                    localStorage.removeItem('user_foto_base64');
                    localStorage.removeItem('nama_user');
                    localStorage.removeItem('username');
                }

                await sinkronisasiDataUser(uid);
                localStorage.setItem('last_uid', uid);
                localStorage.setItem('isLoggedIn', 'true');
                
                // PENTING: Gunakan replace agar history login dihapus
                window.location.replace('dashboard.html');
            } catch (e) {
                let msg = e.message;
                if(e.code === 'auth/wrong-password') msg = "Kata sandi salah.";
                IOSAlert.show("Gagal Masuk", msg);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function loginPihakKetiga(p) {
            if (p !== 'google') return;
            const prov = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(prov).then(async (res) => {
                const uid = res.user.uid;
                if (localStorage.getItem('last_uid') !== uid) localStorage.removeItem('user_foto_base64');
                
                const snap = await window.db.ref(uid).once('value');
                if (!snap.exists()) {
                    await window.db.ref(uid).set({
                        uid: uid, email: res.user.email, nama: res.user.displayName,
                        username: res.user.email.split('@')[0].replace(/[^a-z0-9]/g, ''), 
                        foto: res.user.photoURL, tgl_daftar: new Date().toISOString()
                    });
                }
                await sinkronisasiDataUser(uid);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('last_uid', uid);
                window.location.replace('dashboard.html');
            }).catch(e => {
                if(e.code !== 'auth/popup-closed-by-user') IOSAlert.show("Gagal Google", e.message);
            });
        }

        function prosesResetSandi() {
            const email = document.getElementById('emailResetLupa').value.trim();
            if (!email || !email.includes('@')) return IOSAlert.show("Peringatan", "Email tidak valid!");
            
            firebase.auth().sendPasswordResetEmail(email).then(() => {
                IOSAlert.show("Berhasil", "Tautan reset terkirim! Cek email Anda.");
                tutupPopupLupaPassword();
            }).catch(e => IOSAlert.show("Error", e.message));
        }
    </script>
</body>
</html>
