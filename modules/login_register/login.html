<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk - Smart App</title>
    <link rel="stylesheet" href="../../shared/global.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="auth-header">
            <div id="status-net" class="badge online">● Online</div>
            <h1>Masuk</h1>
            <p>Silahkan masuk ke akun anda</p>
        </header>

        <main class="auth-body">
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username / Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="button" class="btn-main" id="do-login">Login</button>
                
                <div class="divider"><span>ATAU</span></div>
                
                <button type="button" class="btn-google">
                    <img src="https://www.google.com/favicon.ico" width="18" alt="Google icon">
                    Lanjut dengan Google
                </button>
            </form>
        </main>

        <footer class="auth-footer">
            <p>Belum punya akun? <a href="register.html">Daftar</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
