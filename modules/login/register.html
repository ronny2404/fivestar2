<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buat Akun - Smart App</title>
    <link rel="stylesheet" href="/fivestar2/shared/global.css">
    <link rel="stylesheet" href="/fivestar2/modules/login/login.css">
</head>
<body>
    <div class="app-container">
        <header class="auth-header">
            <div id="status-net" class="badge online">● Online</div>
            <h1>Buat Akun</h1>
            <p>Daftar untuk pengalaman yang lebih baik</p>
        </header>

        <main class="auth-body">
            <form id="register-form">
                <div class="input-group">
                    <input type="text" placeholder="Nama Lengkap" required>
                    <input type="email" placeholder="Email Baru" required>
                    <input type="password" placeholder="Buat Password" required>
                </div>
                <button type="button" class="btn-main">Buat Akun</button>
                
                <div class="divider"><span>ATAU</span></div>
                
                <button type="button" class="btn-google">
                    <img src="https://www.google.com/favicon.ico" width="18" alt="Google icon">
                    Daftar dengan Google
                </button>
            </form>
        </main>

        <footer class="auth-footer">
            <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
        </footer>
    </div>

    <script src="/fivestar2/modules/login/login.js"></script>
</body>
</html>
