<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Android Style</title>
    <link rel="stylesheet" href="shared/global.css">
    <link rel="stylesheet" href="modules/login/login.css">
</head>
<body>
    <div class="app-container">
        <header class="auth-header">
            <div id="status-net" class="badge online">● Online</div>
            <h1 id="auth-title">Selamat Datang</h1>
            <p id="auth-subtitle">Silahkan masuk ke akun anda</p>
        </header>

        <main class="auth-body">
            <div class="form-wrapper" id="form-wrapper">
                <form id="login-form" class="auth-form">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username / Email" required>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="button" class="btn-main" id="do-login">Login</button>
                    
                    <div class="divider"><span>ATAU</span></div>
                    
                    <button type="button" class="btn-google">
                        <img src="https://www.google.com/favicon.ico" width="18">
                        Lanjut dengan Google
                    </button>
                </form>

                <form id="register-form" class="auth-form hidden">
                    <div class="input-group">
                        <input type="text" placeholder="Nama Lengkap">
                        <input type="email" placeholder="Email Baru">
                        <input type="password" placeholder="Buat Password">
                    </div>
                    <button type="button" class="btn-main">Buat Akun</button>
                </form>
            </div>
        </main>

        <footer class="auth-footer">
            <p id="switch-text">Belum punya akun? <span id="toggle-auth">Daftar</span></p>
        </footer>
    </div>

    <script src="modules/login/login.js"></script>
</body>
</html>
