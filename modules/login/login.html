<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - System Gateway</title>
    <link rel="stylesheet" href="../../shared/global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="desktop">
        <div class="window">
            <div class="title-bar">
                <div class="title-bar-text">User Authentication</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close"></button>
                </div>
            </div>

            <div class="window-body">
                <p class="instruction">Mohon identifikasi diri Anda untuk melanjutkan:</p>
                
                <div class="field-row-stacked">
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Nama Anda...">
                </div>

                <div class="status-row">
                    <label>Status:</label>
                    <span id="status-online" class="status-text">Checking...</span>
                </div>

                <hr>

                <div class="button-row">
                    <button id="btn-login">OK</button>
                    <button onclick="location.reload()">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
