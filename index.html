<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart PWA - Gateway</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>
<body>
    <script>
        // Registrasi Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }

        // Cek Sesi: Jika sudah login, ke dashboard. Jika belum, ke login.
        const isLoggedIn = sessionStorage.getItem('is_logged_in');
        if (isLoggedIn === 'true') {
            window.location.href = 'modules/dashboard/dashboard.html';
        } else {
            window.location.href = 'modules/login_register/login.html';
        }
    </script>
</body>
</html>
