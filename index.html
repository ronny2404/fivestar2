<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIVE STAR 2 - Gateway</title>
    
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FIVE STAR 2">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        (function() {
            function applyTheme() {
                const savedTheme = localStorage.getItem('app-theme');
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = savedTheme === 'dark' || (!savedTheme && systemDark);
                document.documentElement.classList.toggle('dark-theme', isDark);
                if (document.body) { document.body.classList.toggle('dark-theme', isDark); }
            }
            applyTheme();
            window.addEventListener('DOMContentLoaded', applyTheme);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                if (!localStorage.getItem('app-theme')) applyTheme();
            });
        })();
    </script>
    
    <style>
        .loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 30000;
        }
        .ios-spinner {
            width: 35px; height: 35px; border: 3px solid rgba(142, 142, 147, 0.2);
            border-top-color: #007AFF; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="splashScreen" class="loader-container"><div class="ios-spinner"></div></div>
    <div id="app-root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

    <script src="js/core/firebase.js"></script>
    <script src="js/core/main.js"></script>
    <script src="js/auth/login.js"></script>
    <script src="js/auth/register.js"></script>

    <script>
        // --- LOGIKA GATEWAY & SESSION ---
        document.addEventListener('DOMContentLoaded', () => {
            const sessionActive = localStorage.getItem('isLoggedIn');
            setTimeout(() => {
                if (sessionActive === 'true') {
                    window.location.href = 'dashboard.html';
                } else {
                    const loader = document.getElementById('splashScreen');
                    if (loader) {
                        loader.style.opacity = '0';
                        loader.style.transition = 'opacity 0.4s ease';
                        setTimeout(() => {
                            loader.style.display = 'none';
                            if (typeof inisialisasiLogin === 'function') { inisialisasiLogin(); }
                        }, 400);
                    } else { 
                        if (typeof inisialisasiLogin === 'function') { inisialisasiLogin(); } 
                    }
                }
            }, 800);
        });

        // --- LOGIKA PWA & AUTO UPDATE ---
        if ('serviceWorker' in navigator) {
            let newWorker;
    
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            tampilkanNotifUpdate(reg);
                        }
                    });
                });
            });
    
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    
        function tampilkanNotifUpdate(reg) {
            if (typeof IOSAlert !== 'undefined') {
                IOSAlert.show("Update Tersedia", "Versi terbaru FIVE STAR 2 sudah siap digunakan.", {
                    teksTombol: "Segarkan Sekarang",
                    onConfirm: () => {
                        if (reg.waiting) {
                            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                        } else {
                            window.location.reload();
                        }
                    }
                });
            } else {
                if (confirm("Versi baru tersedia. Refresh sekarang?")) {
                    window.location.reload();
                }
            }
        }
    </script>
</body>
</html>
