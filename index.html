<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gateway - FIVE STAR 2</title>
    
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <style>
        /* CSS INTERNAL: Memastikan loading super cepat tanpa menunggu main.css */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #F2F2F7; }
        body.dark-theme { background: #000000; }
        
        .loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 30000;
        }
        .ios-spinner {
            width: 35px; height: 35px; border: 3px solid rgba(142, 142, 147, 0.2);
            border-top-color: #007AFF; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        // 1. TEMA INSTAN (Mencegah Layar Putih Berkedip)
        (function() {
            const savedTheme = localStorage.getItem('app-theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme === 'dark' || (!savedTheme && systemDark);
            if (isDark) {
                document.documentElement.classList.add('dark-theme');
                window.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-theme'));
            }
        })();
    </script>
</head>
<body>
    
    <div id="splashScreen" class="loader-container">
        <div class="ios-spinner"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="js/core/firebase.js"></script>
    <script src="js/core/app.js"></script>

    <script>
        // ==========================================
        // GATEWAY LOGIC - PENGHANCUR RIWAYAT
        // ==========================================
        document.addEventListener("DOMContentLoaded", function() {
            const statusLokal = localStorage.getItem('isLoggedIn');
            
            // 1. CEK CEPAT: Jika memori lokal bilang false, langsung tendang ke Login (Tanpa nunggu Firebase)
            if (statusLokal !== 'true') {
                window.location.replace('login.html');
                return;
            }

            // 2. CEK AKURAT: Pengecekan sesi ke server Firebase
            firebase.auth().onAuthStateChanged((user) => {
                if (user && statusLokal === 'true') {
                    // Valid! Ganti halaman ke Dashboard dan HAPUS index.html dari riwayat
                    window.location.replace('dashboard.html');
                } else {
                    // Tidak valid! Bersihkan memori lalu ke Login
                    localStorage.setItem('isLoggedIn', 'false');
                    window.location.replace('login.html');
                }
            });
        });
    </script>
</body>
</html>
