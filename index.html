<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway - Smart PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-container">
        <div class="card">
            <div class="header">
                <h1>Smart App</h1>
                <div id="status-badge" class="badge checking">Mengecek koneksi...</div>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Ketik nama Anda..." autocomplete="off">
                <small>Data otomatis tersimpan agar tidak hilang (Anti-Lost).</small>
            </div>

            <button id="login-btn">Masuk Ke Aplikasi</button>
            
            <div class="footer-info">
                <p id="session-info">Belum ada sesi aktif</p>
                <p id="cache-info">Versi: 1.0.0</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Registrasi Service Worker dari Root
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker aktif'))
                    .catch(err => console.error('SW Gagal:', err));
            });
        }
    </script>
</body>
</html>
